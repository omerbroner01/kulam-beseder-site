<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כולם בסדר - Android Beta</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .box {
      max-width: 700px;
      margin: 60px auto;
      background: #1e293b;
      border-radius: 20px;
      padding: 40px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-top: 0;
      font-size: 40px;
    }

    p {
      font-size: 18px;
      line-height: 1.7;
      color: #dbeafe;
    }

    .badge {
      display: inline-block;
      margin: 16px 0 24px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #2563eb;
      font-size: 14px;
      font-weight: bold;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
    }

    .button.disabled {
      background: #475569;
      cursor: default;
    }

    .small {
      margin-top: 24px;
      font-size: 14px;
      color: #94a3b8;
    }

    a {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>כולם בסדר</h1>
    <div class="badge">Android Beta</div>

    <p>
      אפליקציה פשוטה לעדכון מצב אישי, ניהול מעגל קרוב,
      ושיתוף עדכוני חירום במהירות.
    </p>

    <p>
      הבילד הציבורי הראשון יעלה בקרוב.
    </p>

    <a class="button disabled">ההורדה תיפתח בקרוב</a>

    <div class="small">
      ליצירת קשר: omer.broner23@gmail.com
    </div>
  </div>
</body>
</html>
